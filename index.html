<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramardo | All My Link </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
            /* City Night Lights Background */
            background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
padding: clamp(20px, 5vw, 40px);
        }
        .profile-img {
            width: clamp(90px, 18vw, 120px);
            height: clamp(90px, 18vw, 120px);
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 36px;
            border: 5px solid rgba(255,255,255,0.5);
            box-shadow: 0 25px 70px rgba(0,0,0,0.8);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .profile-img:hover {
            transform: scale(1.08);
            border-color: rgba(255,255,255,0.9);
            box-shadow: 0 40px 100px rgba(0,0,0,1);
        }
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        h1 {
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 50%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            text-shadow: 0 8px 32px rgba(0,0,0,0.8);
            animation: rainbow 3s linear infinite;
        }
        .bio {
            font-size: clamp(0.85rem, 3.5vw, 0.95rem);
            color: rgba(255,255,255,0.95);
            margin-bottom: clamp(28px, 8vw, 40px);
            font-weight: 500;
            letter-spacing: 0.3px;
            text-align: center;
        }
        /* Main Links + Social Icons */
        .main-links {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 4vw, 18px);
            width: 100%;
            max-width: 420px;
            margin-bottom: clamp(28px, 8vw, 40px);
        }
        .link-section {
            display: flex;
            align-items: center;
            gap: clamp(10px, 3vw, 14px);
            padding: clamp(12px, 3vw, 16px) clamp(16px, 4vw, 20px);
            min-height: 48px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }
        .link-section:hover {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .link-icon {
            width: clamp(44px, 11vw, 52px);
            height: clamp(44px, 11vw, 52px);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            background: rgba(255,255,255,0.3);
            border: 2px solid rgba(255,255,255,0.6);
            transition: all 0.4s ease;
            flex-shrink: 0;
        }
        .link-section:hover .link-icon {
            background: rgba(255,255,255,0.7);
            transform: scale(1.2) rotate(360deg);
        }
        .link-info h3 {
            font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            font-weight: 700;
            margin-bottom: 2px;
            opacity: 1;
        }
        .link-info p {
            font-size: clamp(0.75rem, 2.8vw, 0.85rem);
            opacity: 0.9;
            font-weight: 400;
            margin: 0;
        }
        /* Discord & Portfolio - Bottom */
        .bottom-links {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 4vw, 18px);
            width: 100%;
            max-width: 420px;
        }
        /* Music Button */
        .music-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(40px);
            border: 3px solid rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.9rem;
            color: white;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 400;
            box-shadow: 0 25px 70px rgba(0,0,0,0.8);
        }
        .music-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.5);
        }
        .music-btn.active {
            background: linear-gradient(135deg, rgba(34,197,94,0.9), rgba(16,185,129,0.8));
        }
        @media (max-width: 768px) {
            body {
                padding: 20px;
                justify-content: flex-start;
                gap: 20px;
            }
            .main-links, .bottom-links {
                max-width: 100%;
            }
            .link-section {
                padding: 16px 20px;
                gap: 14px;
            }
            .link-icon {
                width: 44px;
                height: 44px;
                font-size: 1.3rem;
            }
            .profile-img {
                margin-bottom: 24px;
            }
            .bio {
                margin-bottom: 28px;
            }
        }

        @media (max-width: 480px) {
            .music-btn {
                width: 68px;
                height: 68px;
                font-size: 1.6rem;
                bottom: 20px;
                right: 20px;
            }
            .link-info h3 {
                font-size: 1rem;
            }
            .link-info p {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 16px;
            }
            .link-section {
                padding: 14px 16px;
            }
            .profile-img {
                width: 80px;
                height: 80px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
    </head>
<body>
    
    <!-- Profile -->
    <img src="images/profile.jpg" alt="Ramardo" class="profile-img">
    
    <!-- Name & Bio -->
    <h1>Ramardo</h1>
    <p class="bio">All My Sosmed!</p>
    
    <!-- Email, WhatsApp, GitHub - Icons + Descriptions -->
    <div class="main-links">
        <a href="mailto:favrama@gmail.com" class="link-section">
            <div class="link-icon"><i class="fas fa-envelope"></i></div>
            <div class="link-info">
                <h3>Email</h3>
                <p>Contact Me</p>
            </div>
        </a>
        
        <a href="https://instagram.com/ramardo1_" target="_blank" class="link-section">
            <div class="link-icon"><i class="fab fa-instagram"></i></div>
            <div class="link-info">
                <h3>Instagram</h3>
                <p>Follow Me</p>
            </div>
        </a>
        
        <a href="https://github.com/Ramardooooo/" target="_blank" class="link-section">
            <div class="link-icon"><i class="fab fa-github"></i></div>
            <div class="link-info">
                <h3>GitHub</h3>
                <p>My Project</p>
            </div>
        </a>
    </div>

    <!-- Discord & Portfolio Only -->
    <div class="bottom-links">
        <a href="https://discord.gg/preman" target="_blank" class="link-section">
            <div class="link-icon"><i class="fab fa-discord"></i></div>
            <div class="link-info">
                <h3>My Community</h3>
                <p>Community GTA SA-MP/FiveM</p>
            </div>
        </a>
        
        <a href="../index.html" class="link-section">
            <div class="link-icon"><i class="fas fa-globe"></i></div>
            <div class="link-info">
                <h3>Portfolio</h3>
                <p>About Me</p>
            </div>
        </a>
    </div>

    <!-- Music Controls - Always Visible Volume -->
    <div class="music-container" style="position: fixed; bottom: 32px; right: 32px; display: flex; gap: 12px; z-index: 400; align-items: center;">
        <div class="music-btn" id="musicBtn" style="width: 70px; height: 70px;">
            <i class="fas fa-music" id="musicIcon"></i>
        </div>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.25" style="width: 100px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; cursor: pointer; accent-color: #22c55e;" />
    </div>

<audio id="audio" autoplay loop preload="auto">
<source src="lagu/Ravyn Lenae - Love Me Not (Lyrics).mp3" type="audio/mpeg" preload="auto">
    </audio>

        <script>
        const btn = document.getElementById('musicBtn');
        const icon = document.getElementById('musicIcon');
        const audio = document.getElementById('audio');
        let playing = false;

        // AUTO START MUSIC when page loads - multiple triggers
        const startMusic = () => {
            if (!playing) {
                audio.play();
            }
        };

        // Trigger on ANY user interaction immediately
        ['click', 'touchstart', 'keydown', 'mousedown', 'mousemove'].forEach(event => {
            document.addEventListener(event, startMusic, { once: true, passive: true });
        });

        // Also on DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            audio.volume = 0.25;
            // Final attempt after short delay
            setTimeout(startMusic, 500);
            btn.onclick = () => {
                if (playing) {
                    audio.pause();
                } else {
                    audio.play();
                }
            };
        });

        audio.onplay = () => {
            playing = true;
            btn.classList.add('active');
            icon.className = 'fas fa-pause';
        };
        
        audio.onpause = () => {
            playing = false;
            btn.classList.remove('active');
            icon.className = 'fas fa-music';
        };

        // Volume slider support
        const volumeSlider = document.getElementById('volumeSlider');
        if (volumeSlider) {
            volumeSlider.oninput = () => audio.volume = volumeSlider.value;
        }
    </script>
</body>
</html>
